<!DOCTYPE html>
<html lang="fr">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inscription - Doctor Drip</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* --- Style original conservé --- */

    body {
      background: #121212;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1e1e1e;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .logo img {
      height: 40px;
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      gap: 15px;
    }

    nav ul li a {
      color: #bbb;
      text-decoration: none;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    nav ul li a:hover,
    nav ul li a.active {
      background-color: #00bfff;
      color: white;
    }

    main.auth {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 10px;
      background: linear-gradient(to right, #1e1e1e, #2c2c2c);
    }

    form.form {
      background-color: #222;
      padding: 25px 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px #00000088;
      max-width: 400px;
      width: 100%;
      box-sizing: border-box;
      transition: border 0.5s ease;
      border: 2px solid transparent;
    }

    form.form.success {
      border-color: #4caf50;
      animation: fadeInBorder 1s ease forwards;
    }

    @keyframes fadeInBorder {
      0% {
        border-color: transparent;
      }
      100% {
        border-color: #4caf50;
      }
    }

    form.form h2 {
      margin-top: 0;
      margin-bottom: 20px;
      text-align: center;
      font-weight: 700;
      color: #00bfff;
    }

    form.form label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      font-size: 0.9em;
      color: #ccc;
    }

    form.form input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      box-sizing: border-box;
    }

    form.form input:focus {
      outline: none;
      box-shadow: 0 0 5px #00bfff;
    }

    form.form button {
      width: 100%;
      background-color: #00bfff;
      border: none;
      color: white;
      font-size: 1.1em;
      padding: 12px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 700;
      transition: background-color 0.3s ease;
    }

    form.form button:hover {
      background-color: #0093d1;
    }

    form.form p {
      margin-top: 15px;
      text-align: center;
      font-size: 0.9em;
      color: #aaa;
    }

    form.form p a {
      color: #00bfff;
      text-decoration: none;
      font-weight: 700;
    }

    form.form p a:hover {
      text-decoration: underline;
    }

    .error-message {
      color: #ff5555;
      text-align: center;
      margin-top: 10px;
      min-height: 20px;
      font-weight: 600;
    }

    /* Suppression des boutons Google et Apple */
  </style>
  <!-- Firebase App (le SDK Firebase modulaire version 9) -->
  <script type="module">
    // Import des fonctions Firebase depuis CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithPopup,
      OAuthProvider
    } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDHQ4Ia5XAA5jPJMP5z0t5RNhoiJ7olc0c",
      authDomain: "ton-projet.firebaseapp.com",
      projectId: "ton-projet",
      storageBucket: "ton-projet.appspot.com",
      messagingSenderId: "ton_sender_id",
      appId: "ton_app_id"
    };

    // Initialisation Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.registerUser = function () {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm').value;
      const errorMessage = document.getElementById('errorMessage');
      const form = document.querySelector('form.form');

      errorMessage.textContent = '';
      form.classList.remove('success');

      if (password !== confirmPassword) {
        errorMessage.textContent = 'Les mots de passe ne correspondent pas.';
        return;
      }
      if (password.length < 6) {
        errorMessage.textContent = 'Le mot de passe doit contenir au moins 6 caractères.';
        return;
      }

      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          // Inscription réussie
          console.log('Utilisateur inscrit:', userCredential.user);
          errorMessage.textContent = '';
          form.classList.add('success');

          // Animation de la bordure verte (reste visible 2 secondes)
          setTimeout(() => {
            form.classList.remove('success');
            window.location.href = 'index.html'; // Redirection après animation
          }, 2000);
        })
        .catch((error) => {
          console.error('Erreur inscription:', error);
          // Affichage message d'erreur simplifié (français)
          switch (error.code) {
            case 'auth/email-already-in-use':
              errorMessage.textContent = 'Cette adresse e-mail est déjà utilisée.';
              break;
            case 'auth/invalid-email':
              errorMessage.textContent = 'Adresse e-mail invalide.';
              break;
            case 'auth/weak-password':
              errorMessage.textContent = 'Mot de passe trop faible.';
              break;
            default:
              errorMessage.textContent = error.message;
          }
        });
    };
  </script>
</head>

<body>
 <header>
  <div class="logo">
    <img src="images/logo.png" alt="Doctor Drip Logo" />
  </div>
  <nav>
    <div class="menu-toggle" id="menu-toggle">☰</div>
    <ul id="menu">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="shop.html">Boutique</a></li>
      <li><a href="login.html">Connexion</a></li>
      <li><a href="register.html">Inscription</a></li>
      <li><a href="checkout.html">Panier</a></li>
    </ul>
  </nav>
  <div class="profile-icon" id="profileIcon"></div>
</header>


  <main class="auth">
    <form class="form" onsubmit="event.preventDefault(); registerUser();">
      <h2>Inscription</h2>
      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" name="email" required placeholder="mail@example.com" />
      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" required placeholder="••••••••" />
      <label for="confirm">Confirmer le mot de passe</label>
      <input type="password" id="confirm" name="confirm" required placeholder="••••••••" />
      <button type="submit">S'inscrire</button>
      <p>Tu as déjà un compte ? <a href="login.html">Connecte-toi ici</a>.</p>
      <div class="error-message" id="errorMessage"></div>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Doctor Drip. Tous droits réservés.</p>
  </footer>
</body>

</html>
