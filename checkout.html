<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Drip - Paiement</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #0f0f0f;
      color: #fff;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    /* Arrière-plan particles */
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
      background-color: #0f0f0f;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 10%;
      background-color: #111;
      box-shadow: 0 4px 6px rgba(0, 191, 255, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo img {
      height: 50px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 25px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      position: relative;
    }

    nav a::after {
      content: "";
      height: 2px;
      background: #00bfff;
      position: absolute;
      width: 0;
      left: 0;
      bottom: -4px;
      transition: 0.3s;
    }

    nav a:hover::after,
    nav a.active::after {
      width: 100%;
    }

    main {
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #00bfff;
    }

    form label {
      display: block;
      margin: 15px 0 5px;
    }

    form input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background-color: #222;
      color: white;
      font-size: 1rem;
    }

    .delivery-method {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 25px 0;
    }

    .delivery-method label {
      background: #1a1a1a;
      border: 2px solid #00bfff;
      border-radius: 12px;
      padding: 20px 30px;
      font-size: 1.2rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.3s;
    }

    .delivery-method input {
      display: none;
    }

    .delivery-method label:hover,
    .delivery-method input:checked+label {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00bfff;
    }

    #relay-container {
      display: none;
      margin-top: 20px;
    }

    button {
      margin-top: 30px;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(to right, #00bfff, #008cba);
      color: white;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: linear-gradient(to right, #009edf, #0077a3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background-color: #1c1c1c;
      border-radius: 12px;
      overflow: hidden;
    }

    th,
    td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #333;
    }

    th {
      background-color: #00bfff;
      color: black;
    }

    td button {
      background: #ff3b3b;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 5px 10px;
      cursor: pointer;
      font-weight: bold;
    }

    /* 💸 Animation billets euros */
    .cash {
      position: fixed;
      top: -100px;
      width: 100px;
      height: 50px;
      background-image: url('https://i.imgur.com/nR1M4Vv.png');
      background-size: contain;
      background-repeat: no-repeat;
      animation: fall 2.5s ease-in forwards;
      pointer-events: none;
    }

    @keyframes fall {
      0% {
        transform: translateY(-100px) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(120vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <!-- Arrière-plan particles.js -->
  <div id="particles-js"></div>

  <header>
    <div class="logo">
      <img src="images/logo.png" alt="Doctor Drip">
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Accueil</a></li>
        <li><a href="shop.html">Boutique</a></li>
        <li><a href="checkout.html" class="active">Panier</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <!-- 🛒 Récapitulatif du panier -->
    <h2>Récapitulatif</h2>
    <table id="cart-table">
      <thead>
        <tr>
          <th>Produit</th>
          <th>Couleur</th>
          <th>Taille</th>
          <th>Quantité</th>
          <th>Prix</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <!-- 📦 Formulaire de livraison -->
    <h2>Informations de livraison</h2>
    <form id="checkout-form">
      <label for="name">Nom complet</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="address">Adresse</label>
      <input type="text" id="address" name="address" required>

      <label for="city">Ville</label>
      <input type="text" id="city" name="city" required>

      <label for="postal">Code postal</label>
      <input type="text" id="postal" name="postal" required>

      <label for="country">Pays</label>
      <input type="text" id="country" name="country" required>

      <div class="delivery-method">
        <input type="radio" name="delivery" value="domicile" id="domicile" checked>
        <label for="domicile">Domicile</label>

        <input type="radio" name="delivery" value="relais" id="relais">
        <label for="relais">Point Relais</label>
      </div>

      <div id="relay-container">
        <label for="relay">Nom du Point Relais</label>
        <input type="text" id="relay" name="relay" placeholder="Ex: Relais Pickup - La Poste">
      </div>

      <button type="submit">Valider la commande</button>
    </form>
  </main>

  <!-- Script Stripe & logique -->
  <script>
    const deliveryRadios = document.querySelectorAll('input[name="delivery"]');
    const relayContainer = document.getElementById('relay-container');
    deliveryRadios.forEach(radio => {
      radio.addEventListener('change', () => {
        relayContainer.style.display = document.getElementById('relais').checked ? 'block' : 'none';
      });
    });

    let cartItems = JSON.parse(localStorage.getItem('cart') || '[]');
    const tableBody = document.querySelector('#cart-table tbody');

    function updateCartDisplay() {
      tableBody.innerHTML = '';
      cartItems.forEach((item, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.name}</td>
          <td>${item.color}</td>
          <td>${item.size}</td>
          <td>${item.quantity}</td>
          <td>${(item.price * item.quantity).toFixed(2)} €</td>
          <td><button onclick="removeItem(${index})">Supprimer</button></td>
        `;
        tableBody.appendChild(row);
      });
      localStorage.setItem('cart', JSON.stringify(cartItems));
    }

    function removeItem(index) {
      cartItems.splice(index, 1);
      updateCartDisplay();
    }

    updateCartDisplay();

    document.getElementById('checkout-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(e.target);
      const shipping = Object.fromEntries(formData.entries());
      shipping.relay = document.getElementById('relais').checked ? shipping.relay : "";

      for (let i = 0; i < 20; i++) {
        const cash = document.createElement('div');
        cash.classList.add('cash');
        cash.style.left = Math.random() * window.innerWidth + 'px';
        document.body.appendChild(cash);
        setTimeout(() => cash.remove(), 3000);
      }

      const res = await fetch('/create-checkout-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cartItems, shipping })
      });

      const data = await res.json();
      if (data.id) {
        const stripe = Stripe('pk_live_51RaENdJu5wjHrK6J3zWWcLUG8k67bOuTudT11E5TKuqKdUsY61lOw2vtaUmQAzIIqpFrq8RQnTKYGuo61pL4PhIJ00u6cbgmZY');
        stripe.redirectToCheckout({ sessionId: data.id });
      } else {
        alert('Erreur lors de la redirection vers Stripe.');
      }
    });
  </script>

  <!-- Script Particles.js -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    particlesJS("particles-js", {
      "particles": {
        "number": {
          "value": 80,
          "density": { "enable": true, "value_area": 800 }
        },
        "color": { "value": "#ffffff" },
        "shape": {
          "type": "circle",
          "stroke": { "width": 0, "color": "#000000" },
          "polygon": { "nb_sides": 5 }
        },
        "opacity": {
          "value": 0.5,
          "random": false,
          "anim": { "enable": false }
        },
        "size": {
          "value": 3,
          "random": true,
          "anim": { "enable": false }
        },
        "line_linked": {
          "enable": true,
          "distance": 150,
          "color": "#ffffff",
          "opacity": 0.4,
          "width": 1
        },
        "move": {
          "enable": true,
          "speed": 3,
          "direction": "none",
          "random": false,
          "straight": false,
          "out_mode": "out",
          "bounce": false
        }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": { "enable": true, "mode": "grab" },
          "onclick": { "enable": true, "mode": "push" },
          "resize": true
        },
        "modes": {
          "grab": { "distance": 140, "line_linked": { "opacity": 1 } },
          "bubble": { "distance": 400, "size": 40, "duration": 2, "opacity": 8 },
          "repulse": { "distance": 200 },
          "push": { "particles_nb": 4 },
          "remove": { "particles_nb": 2 }
        }
      },
      "retina_detect": true
    });
  </script>

</body>

</html>
