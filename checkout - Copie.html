<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Drip - Checkout</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, rgba(0, 191, 255, 0.15) 0%, transparent 70%),
                  radial-gradient(circle at 20% 30%, rgba(0, 191, 255, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(0, 191, 255, 0.08) 0%, transparent 50%);
      z-index: -2;
      animation: backgroundMove 20s linear infinite;
    }

    @keyframes backgroundMove {
      0% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(-20px, 20px);
      }
      100% {
        transform: translate(0, 0);
      }
    }

    body::after {
      content: "";
      position: fixed;
      top: -200px;
      left: -200px;
      width: 200%;
      height: 200%;
      background: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.01) 1px, transparent 1px, transparent 30px);
      z-index: -3;
      transform: rotate(30deg);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 10%;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      z-index: 10;
      position: relative;
    }

    .logo img {
      height: 55px;
      filter: drop-shadow(0 0 6px rgba(0, 191, 255, 0.7));
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 28px;
    }

    nav a {
      text-decoration: none;
      color: #f5f5f5;
      font-weight: 600;
      font-size: 1rem;
      position: relative;
    }

    nav a::after {
      content: '';
      display: block;
      height: 2px;
      background: #00bfff;
      width: 0;
      transition: width 0.3s;
      position: absolute;
      bottom: -5px;
      left: 0;
    }

    nav a:hover::after,
    nav a.active::after {
      width: 100%;
    }

    main.checkout {
      padding: 80px 6%;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    section {
      margin-bottom: 60px;
    }

    h2 {
      font-size: 2.2rem;
      text-align: center;
      margin-bottom: 30px;
      color: #00bfff;
      text-shadow: 0 0 10px rgba(0, 191, 255, 0.5);
    }

    #order-summary {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      overflow-x: auto;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      padding: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    th,
    td {
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    th {
      background: rgba(0, 191, 255, 0.15);
      font-weight: 600;
      font-size: 1rem;
    }

    #total-display {
      text-align: right;
      font-size: 1.5rem;
      font-weight: bold;
      margin-top: 15px;
      padding: 10px;
      background: rgba(0, 191, 255, 0.1);
      border-radius: 8px;
    }

    .form {
      background: rgba(255, 255, 255, 0.03);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      max-width: 600px;
      margin: 0 auto;
    }

    .form label {
      display: block;
      margin-top: 20px;
      font-weight: 600;
    }

    .form input {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #222;
      color: #f5f5f5;
      font-size: 1rem;
      transition: border 0.3s, background 0.3s;
    }

    .form input:focus {
      outline: none;
      border: 1px solid #00bfff;
      background-color: #2c2c2c;
    }

    .form button {
      width: 100%;
      padding: 16px;
      margin-top: 30px;
      background: linear-gradient(145deg, #00bfff, #009acf);
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      color: #fff;
      box-shadow: 0 5px 15px rgba(0, 191, 255, 0.4);
    }

    .form button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 191, 255, 0.6);
    }

    .back-to-top {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #00bfff;
      color: white;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 24px;
      cursor: pointer;
      display: none;
      box-shadow: 0 4px 10px rgba(0, 191, 255, 0.5);
      transition: background 0.3s, transform 0.3s;
    }

    .back-to-top:hover {
      background: #009acf;
      transform: scale(1.1);
    }

    .back-to-top.show {
      display: block;
    }

    button.remove {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: #ff4d4d;
      transition: transform 0.3s, color 0.3s;
    }

    button.remove:hover {
      color: #ff1a1a;
      transform: scale(1.3);
      text-shadow: 0 0 5px #ff4d4d;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">
      <img src="images/logo.png" alt="Logo Doctor Drip" />
    </div>
    <nav>
      <ul id="menu">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="shop.html">Boutique</a></li>
        <li><a href="login.html">Connexion</a></li>
        <li><a href="register.html">Inscription</a></li>
        <li><a href="checkout.html" class="active">Panier</a></li>
      </ul>
    </nav>
  </header>

  <main class="checkout">
    <section>
      <h2>Résumé de commande</h2>
      <div id="order-summary">
        <table>
          <thead>
            <tr>
              <th>Article</th>
              <th>Couleur</th>
              <th>Taille</th>
              <th>Prix</th>
              <th>Quantité</th>
              <th>Total</th>
              <th>Supprimer</th>
            </tr>
          </thead>
          <tbody id="cart-items"></tbody>
        </table>
      </div>
      <div id="total-display">Total : 0.00 €</div>
    </section>

    <section>
      <h2>Informations de livraison</h2>
      <form id="checkout-form" class="form">
        <label for="name">Nom complet</label>
        <input type="text" name="name" id="name" required autocomplete="name">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" required autocomplete="email">
        <label for="address">Adresse</label>
        <input type="text" name="address" id="address" required autocomplete="street-address">
        <label for="city">Ville</label>
        <input type="text" name="city" id="city" required autocomplete="address-level2">
        <label for="postal">Code postal</label>
        <input type="text" name="postal" id="postal" required autocomplete="postal-code">
        <label for="country">Pays</label>
        <input type="text" name="country" id="country" required autocomplete="country">
        <button type="submit">Finaliser l'achat</button>
      </form>
    </section>
  </main>

  <button class="back-to-top" id="back-to-top" aria-label="Retour en haut">↑</button>

  <script>
    const stripe = Stripe('pk_live_51RaENdJu5wjHrK6J3zWWcLUG8k67bOuTudT11E5TKuqKdUsY61lOw2vtaUmQAzIIqpFrq8RQnTKYGuo61pL4PhIJ00u6cbgmZY');

    function getCartItems() {
      return JSON.parse(localStorage.getItem('cart')) || [];
    }

    function saveCartItems(cart) {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function updateCart() {
      const cartItems = getCartItems();
      const cartTable = document.getElementById('cart-items');
      const totalDisplay = document.getElementById('total-display');
      let total = 0;

      cartTable.innerHTML = '';
      cartItems.forEach((item, index) => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;

        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.name}</td>
          <td>${item.color}</td>
          <td>${item.size}</td>
          <td>${item.price.toFixed(2)} €</td>
          <td>${item.quantity}</td>
          <td>${itemTotal.toFixed(2)} €</td>
          <td><button class="remove" onclick="removeItem(${index})">×</button></td>
        `;
        cartTable.appendChild(row);
      });

      totalDisplay.textContent = `Total : ${total.toFixed(2)} €`;
    }

    function removeItem(index) {
      const cartItems = getCartItems();
      cartItems.splice(index, 1);
      saveCartItems(cartItems);
      updateCart();
    }

    document.getElementById('checkout-form').addEventListener('submit', async function (event) {
      event.preventDefault();

      const formData = new FormData(this);
      const shipping = Object.fromEntries(formData.entries());
      const cartItems = getCartItems();

      try {
        if (!cartItems.length) throw new Error('Votre panier est vide.');
        if (!shipping.name || !shipping.email) throw new Error('Veuillez remplir tous les champs requis.');

        const response = await fetch('/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cartItems, shipping })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || 'Erreur serveur');
        }

        const session = await response.json();
        if (!session.id) throw new Error('ID de session Stripe manquant');
        stripe.redirectToCheckout({ sessionId: session.id });

      } catch (error) {
        alert("❌ Paiement échoué : " + error.message);
        console.error(error);
      }
    });

    window.addEventListener('scroll', () => {
      const btn = document.getElementById('back-to-top');
      btn.classList.toggle('show', window.scrollY > 200);
    });

    document.getElementById('back-to-top').addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    updateCart();
  </script>

</body>

</html>
